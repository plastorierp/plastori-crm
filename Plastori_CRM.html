<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plastori CRM — Sistema Comercial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap');
:root{--brand:#E8621A;--brand-d:#c94e0f;--brand-gold:#F5A623;--dark:#12121f;--surface:#1e1e30;--surface2:#252538;--surface3:#2d2d45;--border:rgba(255,255,255,0.08);--text:#f0ede8;--muted:#8b8b9e;--dim:#4a4a62;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;--sidebar:240px;--radius:12px;--rsm:8px;--shadow:0 4px 24px rgba(0,0,0,.4);--ease:.2s cubic-bezier(.4,0,.2,1)}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text)}button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 50%,rgba(232,98,26,.18) 0%,transparent 60%),radial-gradient(ellipse at 75% 20%,rgba(245,166,35,.08) 0%,transparent 50%),var(--dark)}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.llogo{text-align:center;margin-bottom:32px}.llogo img{width:72px;height:72px;object-fit:contain}.llogo h1{font-size:20px;font-weight:700;letter-spacing:2.5px;margin-top:12px}.llogo p{color:var(--muted);font-size:12px;margin-top:4px}
.fg{margin-bottom:16px}.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.fc{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:14px;outline:none;transition:border-color var(--ease)}.fc:focus{border-color:var(--brand)}
.btn-p{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:600;letter-spacing:.4px;transition:all var(--ease)}.btn-p:hover{background:var(--brand-d);transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,98,26,.4)}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}.lhint{color:var(--dim);font-size:11px;text-align:center;margin-top:14px}
#setPassScreen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(6px)}#setPassScreen.open{display:flex}
#app{display:none;flex-direction:row;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden}
.sbhd{padding:18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}.sbhd img{width:34px;height:34px;object-fit:contain;flex-shrink:0}.sbbrand{font-size:13px;font-weight:700;letter-spacing:1.8px}.sbbrand small{display:block;font-size:10px;font-weight:400;color:var(--dim);letter-spacing:0}
nav{flex:1;padding:10px 6px}.nslabel{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin:16px 0 6px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all var(--ease);border:none;background:none;width:100%;text-align:left;white-space:nowrap}.ni:hover{background:var(--surface2);color:var(--text)}.ni.active{background:rgba(232,98,26,.15);color:var(--brand)}.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sbft{padding:10px 6px;border-top:1px solid var(--border);flex-shrink:0}.ucard{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rsm);background:var(--surface2)}.uav{width:30px;height:30px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}.uinf{flex:1;min-width:0}.uname{font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.urole{font-size:10px;color:var(--muted)}.btnlo{background:none;border:none;color:var(--muted);font-size:13px;padding:3px}.btnlo:hover{color:var(--red)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.tbtitle{font-size:17px;font-weight:700}.tbright{display:flex;align-items:center;gap:10px}.srchbox{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 13px}.srchbox input{background:none;border:none;color:var(--text);font-size:13px;width:190px;outline:none}.srchbox input::placeholder{color:var(--dim)}
#content{flex:1;overflow-y:auto;padding:22px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--acc,var(--brand))}.sc-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.sc-val{font-size:26px;font-weight:700;margin:5px 0 2px}.sc-sub{font-size:11px;color:var(--muted)}.sc-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.12}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}.cctitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}.cwrap{position:relative;height:210px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.thdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}.ttitle{font-size:14px;font-weight:600}.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}thead th{background:var(--surface2);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}tbody tr{border-bottom:1px solid var(--border);transition:background var(--ease)}tbody tr:hover{background:var(--surface2)}tbody td{padding:9px 13px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.tpag{padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);font-size:12px;color:var(--muted);flex-wrap:wrap;gap:8px}.pgbtns{display:flex;gap:3px;flex-wrap:wrap}.pgb{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:5px;font-size:11px;cursor:pointer}.pgb:hover,.pgb.on{background:var(--brand);border-color:var(--brand);color:#fff}.pgb:disabled{opacity:.4;cursor:default}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.3px}.bg{background:rgba(34,197,94,.15);color:#22c55e}.br{background:rgba(239,68,68,.15);color:#ef4444}.bb{background:rgba(59,130,246,.15);color:#60a5fa}.by{background:rgba(245,158,11,.15);color:#f59e0b}.bp{background:rgba(139,92,246,.15);color:#a78bfa}.bgr{background:rgba(107,114,128,.15);color:#9ca3af}.bo{background:rgba(232,98,26,.15);color:var(--brand)}
.btn{padding:7px 14px;border-radius:var(--rsm);border:none;font-size:12.5px;font-weight:500;cursor:pointer;transition:all var(--ease);display:inline-flex;align-items:center;gap:5px}.btn-sm{padding:5px 10px;font-size:11.5px}.btn-brand{background:var(--brand);color:#fff}.btn-brand:hover{background:var(--brand-d);transform:translateY(-1px)}.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface3)}.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}.btn-danger:hover{background:rgba(239,68,68,.22)}
.fbar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}.fsel,.finp{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:var(--rsm);font-size:12.5px;outline:none;cursor:pointer}.finp::placeholder{color:var(--dim)}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}.moverlay.open{display:flex}.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:mIn .18s ease}@keyframes mIn{from{transform:scale(.95) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}.mhdr{padding:18px 22px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.mtitle{font-size:15px;font-weight:700}.mclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}.mbody{padding:22px}.mftr{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.fgrid .full{grid-column:1/-1}.flbl{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.fld{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 11px;width:100%;color:var(--text);font-size:13px;outline:none}.fld:focus{border-color:var(--brand)}textarea.fld{resize:vertical;min-height:72px}
.funnelgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:22px}.fcol{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}.fcolhd{padding:11px 13px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.fcolcnt{font-size:10px;background:var(--surface2);border-radius:20px;padding:2px 7px}.fcolsub{font-size:10px;color:var(--muted);padding:3px 13px 6px;border-bottom:1px solid var(--border);flex-shrink:0}.fcolbody{padding:7px;overflow-y:auto;max-height:360px;flex:1}.fitem{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 10px;margin-bottom:5px;cursor:pointer;transition:all var(--ease)}.fitem:hover{border-color:var(--brand);transform:translateY(-1px)}.fitem-co{font-size:11px;font-weight:600}.fitem-pr{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}.fitem-val{font-size:11px;color:var(--green);font-weight:700;margin-top:3px}
.rkitem{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--surface2);border-radius:var(--rsm);margin-bottom:7px}.rknum{font-size:16px;font-weight:700;color:var(--brand);width:26px;flex-shrink:0}.rkinfo{flex:1}.rkname{font-size:13px;font-weight:600}.rksub{font-size:10px;color:var(--muted)}.rkval{font-size:13px;font-weight:700;color:var(--green)}.pbar{height:3px;background:var(--surface3);border-radius:2px;margin-top:5px;overflow:hidden}.pfill{height:100%;background:var(--brand);border-radius:2px;transition:width .8s ease}
#toastC{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}.toast{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:12.5px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;min-width:240px;animation:slideIn .28s ease;border-left:3px solid var(--brand)}.toast.ok{border-color:var(--green)}.toast.err{border-color:var(--red)}@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.ptitle{font-size:21px;font-weight:700;margin-bottom:3px}.psub{font-size:12.5px;color:var(--muted);margin-bottom:18px}.tabs{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:9px;width:fit-content;margin-bottom:18px}.tab{padding:7px 15px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;transition:all var(--ease)}.tab.active{background:var(--brand);color:#fff}
.agrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;margin-bottom:22px}.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}.acard h3{font-size:13px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:7px}.logitem{padding:7px 9px;border-left:2px solid var(--border);margin-bottom:5px}.logitem div:first-child{font-size:12px;color:var(--text)}.logtime{font-size:10px;color:var(--dim);font-family:'DM Mono',monospace}
.taskitem{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface2);border-radius:7px;margin-bottom:5px}.tcheck{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}.tcheck.done{background:var(--green);border-color:var(--green);color:#fff}.tinfo{flex:1}.ttask{font-size:12.5px;font-weight:500}.tmeta{font-size:10px;color:var(--muted)}.empty{text-align:center;padding:40px 16px;color:var(--muted)}.empty-ico{font-size:40px;margin-bottom:10px;opacity:.35}
@media(max-width:900px){.cgrid{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}}
@media(max-width:680px){:root{--sidebar:56px}.sbbrand,.ni span,.uinf{display:none}.ni{justify-content:center;padding:9px}#content{padding:14px}.sgrid{grid-template-columns:1fr 1fr}}
</style>
</head>

// =====================================================================

// --- IndexedDB (cache local sempre disponível) ---
const DB='PlastoriCRM_v4',VER=1; let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB,VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('deals')){
        const s=d.createObjectStore('deals',{keyPath:'id'});
        s.createIndex('vendedor','Vendedor',{unique:false});
      }
      if(!d.objectStoreNames.contains('tasks'))d.createObjectStore('tasks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('users'))d.createObjectStore('users',{keyPath:'username'});
      if(!d.objectStoreNames.contains('logs'))d.createObjectStore('logs',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta'))d.createObjectStore('meta',{keyPath:'k'});
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e);
  });
}
function _idbAll(st){return new Promise((r,j)=>{const t=db.transaction(st,'readonly');const q=t.objectStore(st).getAll();q.onsuccess=()=>r(q.result);q.onerror=e=>j(e)})}
function _idbPut(st,o){return new Promise((r,j)=>{const t=db.transaction(st,'readwrite');const q=t.objectStore(st).put(o);q.onsuccess=()=>r(q.result);q.onerror=e=>j(e)})}
function _idbDel(st,k){return new Promise((r,j)=>{const t=db.transaction(st,'readwrite');const q=t.objectStore(st).delete(k);q.onsuccess=()=>r();q.onerror=e=>j(e)})}
function _idbGet(st,k){return new Promise((r,j)=>{const t=db.transaction(st,'readonly');const q=t.objectStore(st).get(k);q.onsuccess=()=>r(q.result);q.onerror=e=>j(e)})}

// --- Firestore helpers ---
async function _fsAll(col){
  const {collection,getDocs,db:fdb}=window._FS;
  const snap=await getDocs(collection(fdb,col));
  return snap.docs.map(d=>({...d.data(),_fid:d.id}));
}
async function _fsPut(col,obj){
  const {collection,doc,setDoc,addDoc,db:fdb}=window._FS;
  const id=obj.id||obj.username||obj.k;
  if(id){
    const ref=doc(fdb,col,String(id));
    await setDoc(ref,obj,{merge:true});
    return id;
  }else{
    const ref=await addDoc(collection(fdb,col),obj);
    return ref.id;
  }
}
async function _fsDel(col,id){
  const {doc,deleteDoc,db:fdb}=window._FS;
  await deleteDoc(doc(fdb,col,String(id)));
}
async function _fsGet(col,id){
  const {doc,getDoc,db:fdb}=window._FS;
  const snap=await getDoc(doc(fdb,col,String(id)));
  return snap.exists()?{...snap.data(),_fid:snap.id}:null;
}

// --- Roteador principal ---
// deals/tasks/logs → Firestore quando disponível, IndexedDB como fallback
// users/meta → sempre local (segurança: senhas nunca vão ao Firestore)
const LOCAL_ONLY_STORES=['users','meta'];

async function dbAll(st){
  if(FB_READY && !LOCAL_ONLY_STORES.includes(st)){
    try{
      const data=await _fsAll(st);
      // sync para cache local
      for(const d of data)await _idbPut(st,d).catch(()=>{});
      return data;
    }catch(e){console.warn('[DB] Firestore offline, usando cache local:',e.message)}
  }
  return _idbAll(st);
}

async function dbPut(st,obj){
  // Sempre salva local primeiro
  const r=await _idbPut(st,obj).catch(e=>{console.warn('IDB put err',e)});
  if(FB_READY && !LOCAL_ONLY_STORES.includes(st)){
    try{ await _fsPut(st,obj); }
    catch(e){console.warn('[DB] Firestore put falhou, dado salvo localmente:',e.message)}
  }
  return r;
}

async function dbDel(st,id){
  await _idbDel(st,id).catch(()=>{});
  if(FB_READY && !LOCAL_ONLY_STORES.includes(st)){
    try{ await _fsDel(st,String(id)); }
    catch(e){console.warn('[DB] Firestore del falhou:',e.message)}
  }
}

async function dbGet(st,id){
  if(FB_READY && !LOCAL_ONLY_STORES.includes(st)){
    try{
      const d=await _fsGet(st,String(id));
      if(d){await _idbPut(st,d).catch(()=>{});return d;}
    }catch(e){console.warn('[DB] Firestore get falhou, usando local:',e.message)}
  }
  return _idbGet(st,id);
}

async function boot(){
  loadFBConfig();
  await openDB();

  // Limpa cache antigo de versões anteriores
  ['PlastoriCRM2','PlastoriCRM3'].forEach(n=>{try{indexedDB.deleteDatabase(n)}catch(e){}});
  // Garante credenciais no localStorage para a tela de config mostrar preenchido
  if(!localStorage.getItem('plastori_fb_cfg')){
    localStorage.setItem('plastori_fb_cfg', JSON.stringify(FIREBASE_CONFIG));
  }

  // Inicia Firebase automaticamente com credenciais embutidas
  if(FB_CFG && FB_CFG.projectId){
    const ok=await initFirebase(FB_CFG);
    if(ok) updateFBStatus(true);
    else updateFBStatus(false);
  }else{
    updateFBStatus(false);
  }

  // Seed usuários se IndexedDB vazio
  const users=await _idbAll('users');
  if(users.length===0){
    for(const[u,cfg]of Object.entries(DEFAULT_USERS)){
      await _idbPut('users',{username:u,...cfg,passHash:sHash(cfg.tempPass),firstLogin:true});
    }
  }

  // Seed negócios Excel se banco vazio (local + firestore)
  const meta=await _idbGet('meta','seeded');
  if(!meta){
    let total=0;
    for(const[vendor,records]of Object.entries(SEED_ALL)){
      for(const d of records){
        const id='seed_'+vendor+'_'+total;
        const rec={...d,id};
        await _idbPut('deals',rec);
        if(FB_READY){
          try{await _fsPut('deals',rec);}catch(e){}
        }
        total++;
      }
    }
    await _idbPut('meta',{k:'seeded',v:true,ts:new Date().toISOString()});
    console.log('[Plastori] Seeded',total,'records');
  }

  const sess=sessionStorage.getItem('pcu');
  if(sess){CU=JSON.parse(sess);showApp();}
}

function updateFBStatus(online){
  const el=document.getElementById('fbBadge');
  if(!el)return;
  if(online){
    el.innerHTML='🟢 Firebase conectado';
    el.style.color='var(--green)';
  }else{
    el.innerHTML='🔴 Modo local (sem Firebase)';
    el.style.color='var(--red)';
  }
}

async function getDeals(){
  const all=await dbAll('deals');
  if(CU.role==='admin')return all;
  const vn=vendorAliases(CU.vendor);
  return all.filter(d=>vn.includes((d.Vendedor||'').toUpperCase()));
}
function vendorAliases(v){
  if(!v)return[];
  const u=v.toUpperCase();
  const m={'NAYLA':['NAYLA'],'NATALIA':['NATALIA','NATÁLIA'],'MARCELO':['MARCELO'],'ADELITA':['ADELITA']};
  return m[u]||[u];
}
function fMoney(v){const n=parseFloat(v);if(isNaN(n)||!v)return'R$ –';return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fNum(v){const n=parseFloat(v);if(isNaN(n)||!v)return'–';return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function sBadge(s){
  const m={'aprovado':['bg','✓ Aprovado'],'prospecção':['bb','🔍 Prospecção'],
    'orçamento':['by','📄 Orçamento'],'perdido preço':['br','✗ Preço'],
    'perdido qtde':['br','✗ Qtde'],'reprovado finan':['bp','✗ Finan.'],
    'amostra':['bo','🧪 Amostra']};
  const k=(s||'').toLowerCase().trim();const[c,l]=m[k]||['bgr',s];
  return`<span class="badge ${c}">${l}</span>`;
}
async function addLog(msg){
  try{await dbPut('logs',{id:Date.now(),msg,user:CU?.name,ts:new Date().toISOString()})}catch(e){}
}

async function syncToFirestore(){
  if(!FB_READY){toast('Firebase não está conectado','err');return}
  if(!confirm('Enviar todos os dados locais para o Firestore?'))return;
  toast('Sincronizando...','ok');
  let n=0;
  const deals=await _idbAll('deals');
  for(const d of deals){try{await _fsPut('deals',d);n++;}catch(e){console.error(e)}}
  const tasks=await _idbAll('tasks');
  for(const t of tasks){try{await _fsPut('tasks',t);}catch(e){}}
  addLog('Sync Firestore: '+n+' negócios');
  toast(n+' negócios sincronizados com Firestore ✓','ok');
}

async function pullFromFirestore(){
  if(!FB_READY){toast('Firebase não está conectado','err');return}
  if(!confirm('Baixar todos os dados do Firestore para o cache local?'))return;
  try{
    const deals=await _fsAll('deals');
    for(const d of deals)await _idbPut('deals',d).catch(()=>{});
    const tasks=await _fsAll('tasks');
    for(const t of tasks)await _idbPut('tasks',t).catch(()=>{});
    toast(deals.length+' negócios sincronizados localmente ✓','ok');
    addLog('Pull Firestore: '+deals.length+' negócios');
  }catch(e){toast('Erro: '+e.message,'err')}
}

async function retryFirebase(){
  toast('Reconectando ao Firebase...','ok');
  const ok = await initFirebase(FIREBASE_CONFIG);
  if(ok){ toast('Firebase conectado!','ok'); rFirebase(); }
  else toast('Falha ao conectar. Verifique as regras do Firestore.','err');
}

async function pullFromFirestore(){
  if(!FB_READY){toast('Firebase não está conectado','err');return}
  if(!confirm('Baixar todos os dados do Firestore para o cache local?'))return;
  try{
    const deals = await _fsAll('deals');
    for(const d of deals) await _idbPut('deals',d).catch(()=>{});
    const tasks = await _fsAll('tasks');
    for(const t of tasks) await _idbPut('tasks',t).catch(()=>{});
    toast(deals.length+' negócios e '+tasks.length+' tarefas sincronizados localmente ✓','ok');
    addLog('Pull Firestore → local: '+deals.length+' negócios');
  }catch(e){
    toast('Erro ao baixar: '+e.message,'err');
  }
}

function rNegTable(){
  let f=AD;
  if(FS)f=f.filter(d=>(d.Status||'').toLowerCase().includes(FS.toLowerCase()));
  if(FQ){const q=FQ.toLowerCase();f=f.filter(d=>
    (d.Empresa||'').toLowerCase().includes(q)||(d.Produto||'').toLowerCase().includes(q)||
    (d.NoBriefing||'').toLowerCase().includes(q)||(d.Comprador||'').toLowerCase().includes(q)||
    (d.Cidade||'').toLowerCase().includes(q));}
  const tot=f.length,pages=Math.ceil(tot/PPG)||1;
  if(DP>pages)DP=1;
  const s=(DP-1)*PPG,pd=f.slice(s,s+PPG);
  const rev=f.filter(d=>(d.Status||'').toLowerCase()==='aprovado').reduce((a,d)=>a+(parseFloat(d.ValorTotal)||0),0);
  const maxP=Math.min(pages,8);
  let pgHtml='';
  if(pages>1){
    pgHtml+=`<button class="pgb" onclick="DP=Math.max(1,DP-1);rNegTable()" ${DP===1?'disabled':''}>‹</button>`;
    for(let i=1;i<=maxP;i++)pgHtml+=`<button class="pgb ${DP===i?'on':''}" onclick="DP=${i};rNegTable()">${i}</button>`;
    if(pages>maxP)pgHtml+=`<span style="color:var(--dim);padding:0 6px">...+${pages-maxP}</span>`;
    pgHtml+=`<button class="pgb" onclick="DP=Math.min(${pages},DP+1);rNegTable()" ${DP===pages?'disabled':''}>›</button>`;
  }
  document.getElementById('content').innerHTML=`
    <div class="ptitle">Negócios</div>
    <div class="psub">${tot} registros · Aprovados: ${fMoney(rev)}</div>
    <div class="fbar">
      <select class="fsel" onchange="FS=this.value;DP=1;rNegTable()">
        <option value="">Todos os Status</option>
        <option value="aprovado">✓ Aprovado</option><option value="prospecção">Prospecção</option>
        <option value="orçamento">Orçamento</option><option value="perdido">Perdido</option>
        <option value="amostra">Amostra</option><option value="reprovado">Reprovado</option>
      </select>
      <input type="text" class="finp" placeholder="🔍 Empresa, produto, cidade..." value="${FQ}" oninput="FQ=this.value;DP=1;rNegTable()" style="width:260px">
      <button class="btn btn-brand btn-sm" onclick="openAdd()">+ Novo</button>
      <button class="btn btn-ghost btn-sm" onclick="expXLS()">📥 Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="expCSV()">📄 CSV</button>
    </div>
    <div class="tcard">
      <div class="twrap">
        <table>
          <thead><tr><th>Status</th><th>Empresa</th><th>Produto</th><th>Qtde KG</th><th>Valor Total</th><th>Data Inicial</th><th>Vendedor</th><th>Briefing</th><th>Ações</th></tr></thead>
          <tbody>
            ${pd.length===0?`<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:24px">Nenhum resultado</td></tr>`:
              pd.map(d=>`<tr>
                <td>${sBadge(d.Status)}</td>
                <td title="${d.Empresa||''}" style="font-weight:500">${(d.Empresa||'–').substring(0,28)}</td>
                <td title="${d.Produto||''}">${(d.Produto||'').substring(0,25)}</td>
                <td style="font-family:'DM Mono',monospace">${fNum(d.QtdeKG)}</td>
                <td style="color:var(--green);font-weight:600">${fMoney(d.ValorTotal)}</td>
                <td style="font-family:'DM Mono',monospace;font-size:11px">${d.DataInicial||'–'}</td>
                <td>${d.Vendedor||'–'}</td>
                <td style="font-family:'DM Mono',monospace;font-size:11px">${d.NoBriefing||'–'}</td>
                <td style="white-space:nowrap">
                  <button class="btn btn-ghost btn-sm" onclick="openEdit(${JSON.stringify(d.id||d._fid)})">✏️</button>
                  <button class="btn btn-danger btn-sm" onclick="delDeal(${JSON.stringify(d.id||d._fid)})">🗑</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="tpag">
        <span>Exibindo ${s+1}–${Math.min(s+PPG,tot)} de ${tot}</span>
        <div class="pgbtns">${pgHtml}</div>
      </div>
    </div>`;
}

async function rClients(){

async function rTasks(){

function switchTT(t,el){
  document.querySelectorAll('#ttabs .tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');
  document.getElementById('top').style.display=t==='op'?'':'none';
  document.getElementById('tdn').style.display=t==='dn'?'':'none';
}
async function saveTask(){
  const t=document.getElementById('tt').value.trim();
  if(!t){toast('Título obrigatório','err');return}
  const id='task_'+Date.now();
  await dbPut('tasks',{id,title:t,client:document.getElementById('tc').value,
    date:document.getElementById('td').value,priority:document.getElementById('tp').value,
    done:false,uid:CU.username,created:new Date().toISOString()});
  closeMod('taskMod');document.getElementById('tt').value='';
  toast('Tarefa criada!','ok');rTasks();
}
async function togTask(id){
  const all=await dbAll('tasks');const t=all.find(x=>(x.id||x._fid)===id);
  if(t){await dbPut('tasks',{...t,done:!t.done});rTasks()}
}
async function delTask(id){await dbDel('tasks',id);rTasks()}

    NoPedido:document.getElementById('fped').value,NoOP:document.getElementById('fop').value,

    updatedAt:new Date().toISOString()
  };

    const rows=vd.map(d=>({'Status':d.Status,'Empresa':d.Empresa,'Data Inicial':d.DataInicial,
      'Produto':d.Produto,'Qtde (KG)':d.QtdeKG,'Valor Total':d.ValorTotal,
      'Comprador':d.Comprador,'Telefone':d.Telefone,'Email':d.Email,
      'Cidade':d.Cidade,'Estado':d.Estado,'Nº Briefing':d.NoBriefing,'Observação':d.Observacao}));
    const ws=XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,v.substring(0,31));
  });
  XLSX.writeFile(wb,'Plastori_CRM_PorVendedor_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel por vendedor exportado!','ok');
}
async function expCSV(){
  const deals=await getDeals();
  const h=['Status','Empresa','DataInicial','DataFinal','Produto','QtdeKG','ValorUnitCliente','ValorUnitMinimo','ValorTotal','Comprador','Telefone','Email','Cidade','Estado','Vendedor','NoBriefing','KGBriefingIdeal','NoPedido','NoOP','Observacao'];
  const csv=[h.join(';')].concat(deals.map(d=>h.map(k=>`"${(d[k]||'').toString().replace(/"/g,'""')}"`).join(';'))).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='Plastori_CRM_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast('CSV exportado!','ok');
}
async function expBackup(){
  const deals=await dbAll('deals');const tasks=await dbAll('tasks');const logs=await dbAll('logs');
  const blob=new Blob([JSON.stringify({v:3,ts:new Date().toISOString(),deals,tasks,logs},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Plastori_Backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('Backup exportado!','ok');
}
async function doRestore(inp){
  const f=inp.files[0];if(!f)return;
  const txt=await f.text();
  try{
    const data=JSON.parse(txt);
    if(!data.deals)throw new Error('Formato inválido');
    if(!confirm('Restaurar '+data.deals.length+' negócios? Os dados atuais serão SUBSTITUÍDOS.'))return;
    for(const d of data.deals)await dbPut('deals',d);
    for(const t of(data.tasks||[]))await dbPut('tasks',t);
    addLog('Backup restaurado: '+data.deals.length+' negócios');
    toast(data.deals.length+' negócios restaurados!','ok');nav(CP);
  }catch(e){toast('Arquivo inválido: '+e.message,'err')}
  inp.value='';
}
async function doImport(inp){
  const f=inp.files[0];if(!f)return;
  const buf=await f.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let hi=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){
    if(rows[i]&&rows[i].some(c=>typeof c==='string'&&c.toLowerCase().includes('status'))){hi=i;break}
  }
  if(hi<0){toast('Cabeçalho não encontrado','err');return}
  let n=0;
  const keys=['Status','Empresa','DataInicial','DataFinal','Produto','QtdeKG','ValorUnitCliente','ValorUnitMinimo','ValorTotal','Comprador','Telefone','Email','Cidade','Estado','Vendedor','NoBriefing','KGBriefingIdeal','NoPedido','NoOP','Observacao'];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0])continue;
    const d={id:'import_'+Date.now()+'_'+n};
    keys.forEach((k,idx)=>{const v=r[idx];d[k]=v instanceof Date?v.toISOString().slice(0,10):String(v||'').trim()});
    await dbPut('deals',d);n++;
  }
  addLog('Importado Excel: '+n+' registros de '+f.name);
  toast(n+' registros importados de '+f.name,'ok');nav(CP);inp.value='';
}

function closeMod(id){document.getElementById(id).classList.remove('open')}
function toast(msg,type='info'){
  const el=document.createElement('div');el.className='toast '+(type==='ok'?'ok':type==='err'?'err':'');
  el.innerHTML=`<span>${type==='ok'?'✅':type==='err'?'❌':'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toastC').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),400)},3200);
}
