<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plastori CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --brand-primary: #E8621A;
  --brand-dark: #1a1a2e;
  --brand-darker: #12121f;
  --brand-gold: #F5A623;
  --brand-light: #f8f6f3;
  --surface: #1e1e30;
  --surface2: #252538;
  --surface3: #2d2d45;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --text-muted: #8b8b9e;
  --text-dim: #5a5a70;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --teal: #14b8a6;
  --sidebar-w: 240px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--brand-darker); color: var(--text); }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ===================== LOGIN ===================== */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 50%, rgba(232,98,26,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 20%, rgba(245,166,35,0.08) 0%, transparent 50%),
              var(--brand-darker);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%; max-width: 400px;
  box-shadow: var(--shadow);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo img { width: 80px; height: 80px; object-fit: contain; }
.login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 12px; letter-spacing: 2px; }
.login-logo p { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.form-control {
  width: 100%; padding: 12px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
  transition: border-color var(--transition);
  outline: none;
}
.form-control:focus { border-color: var(--brand-primary); }
.btn-primary {
  width: 100%; padding: 13px;
  background: var(--brand-primary); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
  transition: all var(--transition);
}
.btn-primary:hover { background: #d45510; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,98,26,0.4); }
.login-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }
.login-hint { color: var(--text-dim); font-size: 11px; text-align: center; margin-top: 16px; }

/* ===================== APP SHELL ===================== */
#appShell { display: none; flex-direction: row; height: 100vh; overflow: hidden; }

/* ===================== SIDEBAR ===================== */
#sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; overflow-x: hidden;
  transition: width var(--transition);
}
.sidebar-header { padding: 20px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.sidebar-header img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
.sidebar-brand { font-size: 14px; font-weight: 700; letter-spacing: 1.5px; color: var(--text); }
.sidebar-brand small { display: block; font-size: 10px; font-weight: 400; color: var(--text-dim); letter-spacing: 0; }
nav { flex: 1; padding: 12px 8px; }
.nav-section { margin-bottom: 20px; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted);
  transition: all var(--transition); position: relative; white-space: nowrap;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(232,98,26,0.15); color: var(--brand-primary); }
.nav-item.active .nav-icon { color: var(--brand-primary); }
.nav-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: var(--surface2);
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--brand-primary); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 12px; font-weight: 600; color: var(--text); truncate; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.user-role { font-size: 10px; color: var(--text-muted); }
.btn-logout { background: none; border: none; color: var(--text-muted); font-size: 14px; padding: 4px; cursor: pointer; }
.btn-logout:hover { color: var(--red); }

/* ===================== MAIN ===================== */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 14px;
}
.search-box input { background: none; border: none; color: var(--text); font-size: 13px; width: 200px; outline: none; }
.search-box input::placeholder { color: var(--text-dim); }
#mainContent { flex: 1; overflow-y: auto; padding: 24px; }

/* ===================== CARDS / STATS ===================== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; position: relative; overflow: hidden;
}
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent, var(--brand-primary)); }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 28px; font-weight: 700; margin: 6px 0 2px; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text-muted); }
.stat-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 32px; opacity: 0.15; }

/* ===================== CHARTS ===================== */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
}
.chart-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
.chart-wrap { position: relative; height: 220px; }

/* ===================== TABLE ===================== */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.table-title { font-size: 14px; font-weight: 600; }
.table-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background var(--transition); }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 10px 14px; color: var(--text); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.table-pagination { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
.pagination-btns { display: flex; gap: 4px; }
.pg-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.pg-btn:hover, .pg-btn.active { background: var(--brand-primary); border-color: var(--brand-primary); color: white; }

/* ===================== STATUS BADGES ===================== */
.badge {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-green { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-red { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-yellow { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-purple { background: rgba(139,92,246,0.15); color: #a78bfa; }
.badge-gray { background: rgba(107,114,128,0.15); color: #9ca3af; }
.badge-orange { background: rgba(232,98,26,0.15); color: var(--brand-primary); }

/* ===================== BUTTONS ===================== */
.btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-brand { background: var(--brand-primary); color: white; }
.btn-brand:hover { background: #d45510; transform: translateY(-1px); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface3); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.btn-success:hover { background: rgba(34,197,94,0.25); }

/* ===================== FILTERS ===================== */
.filters-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-select {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px;
  outline: none; cursor: pointer;
}
.filter-input {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px;
  outline: none;
}
.filter-input::placeholder { color: var(--text-dim); }

/* ===================== MODAL ===================== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { transform: scale(0.95) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.modal-header { padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .full { grid-column: 1/-1; }
label.field-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.field { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; width: 100%; color: var(--text); font-size: 13px; outline: none; }
.field:focus { border-color: var(--brand-primary); }
textarea.field { resize: vertical; min-height: 80px; }

/* ===================== FUNIL ===================== */
.funnel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.funnel-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.funnel-head { padding: 12px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; }
.funnel-count { background: var(--surface2); border-radius: 20px; padding: 2px 8px; font-size: 10px; }
.funnel-body { padding: 8px; max-height: 400px; overflow-y: auto; }
.funnel-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
  transition: all var(--transition);
}
.funnel-card:hover { border-color: var(--brand-primary); transform: translateY(-1px); }
.funnel-card-company { font-size: 12px; font-weight: 600; color: var(--text); }
.funnel-card-product { font-size: 11px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.funnel-card-value { font-size: 12px; color: var(--green); margin-top: 4px; font-weight: 600; }

/* ===================== RANKING ===================== */
.ranking-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--surface2); border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.rank-num { font-size: 18px; font-weight: 700; color: var(--brand-primary); width: 28px; flex-shrink: 0; }
.rank-info { flex: 1; }
.rank-name { font-size: 14px; font-weight: 600; }
.rank-sub { font-size: 11px; color: var(--text-muted); }
.rank-value { font-size: 14px; font-weight: 700; color: var(--green); }
.progress-bar { height: 4px; background: var(--surface3); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--brand-primary); border-radius: 2px; transition: width 0.8s ease; }

/* ===================== TOAST ===================== */
#toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; font-size: 13px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 10px; min-width: 250px;
  animation: slideIn 0.3s ease; border-left: 3px solid var(--brand-primary);
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===================== SECTION HEADERS ===================== */
.section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.section-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ===================== TABS ===================== */
.tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 10px; width: fit-content; margin-bottom: 20px; }
.tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: none; transition: all var(--transition); }
.tab.active { background: var(--brand-primary); color: white; }

/* ===================== ADMIN ===================== */
.admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.admin-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.user-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: var(--surface2); margin-bottom: 6px; }
.user-list-name { flex: 1; font-size: 13px; }
.user-list-role { font-size: 11px; color: var(--text-muted); }
.log-item { padding: 8px 10px; border-left: 2px solid var(--border); margin-bottom: 6px; font-size: 12px; color: var(--text-muted); }
.log-time { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

/* ===================== TASK ===================== */
.task-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface2); border-radius: 8px; margin-bottom: 6px; }
.task-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.task-check.done { background: var(--green); border-color: var(--green); }
.task-info { flex: 1; }
.task-title { font-size: 13px; font-weight: 500; }
.task-meta { font-size: 11px; color: var(--text-muted); }
.task-date { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

/* ===================== EMPTY STATE ===================== */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-text { font-size: 14px; }

/* ===================== RESPONSIVE ===================== */
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}
@media (max-width: 700px) {
  :root { --sidebar-w: 60px; }
  .sidebar-brand, .nav-item span, .user-info { display: none; }
  .nav-item { justify-content: center; padding: 10px; }
  #mainContent { padding: 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}

/* Set password screen */
#setPasswordScreen {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 2000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
#setPasswordScreen.open { display: flex; }
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="loginScreen">

const DB_NAME = 'PlastoriCRM';
const DB_VER = 1;

  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {

      }
      if (!d.objectStoreNames.contains('tasks')) d.createObjectStore('tasks', { keyPath: 'id', autoIncrement: true });
      if (!d.objectStoreNames.contains('users')) d.createObjectStore('users', { keyPath: 'username' });
      if (!d.objectStoreNames.contains('logs')) d.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = e => rej(e);
  });
}

function dbPut(store, obj) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => res(req.result);
    req.onerror = e => rej(e);
  });
}

function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = e => rej(e);
  });
}

// Simple hash (not cryptographic — for local/offline use)
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash |= 0;
  }
  return hash.toString(16);
}

async function boot() {

      await dbPut('users', { username: u, ...cfg, passHash: simpleHash(cfg.tempPass), firstLogin: true });

  const deals = await dbGetAll('deals');
  if (deals.length === 0) {
    // Load all vendor seed data
    const allVendors = ['nayla','natalia','marcelo','adelita'];
    for (const v of allVendors) {

  const sess = sessionStorage.getItem('plastoriUser');
  if (sess) {

  }

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if (!u || !p) { errEl.textContent = 'Preencha usuário e senha.'; return; }
  
  const tx = db.transaction('users', 'readonly');
  const req = tx.objectStore('users').get(u);
  req.onsuccess = async () => {
    const user = req.result;
    if (!user) { errEl.textContent = 'Usuário não encontrado.'; return; }
    if (simpleHash(p) !== user.passHash) { errEl.textContent = 'Senha incorreta.'; return; }
    
    currentUser = user;
    sessionStorage.setItem('plastoriUser', JSON.stringify(user));
    addLog(`Login: ${user.name}`);
    errEl.textContent = '';
    
    if (user.firstLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('setPasswordScreen').classList.add('open');
    } else {
      showApp();
    }
  };
}

async function setNewPassword() {
  const p1 = document.getElementById('newPass1').value;
  const p2 = document.getElementById('newPass2').value;
  const errEl = document.getElementById('setPassError');
  if (p1.length < 6) { errEl.textContent = 'Senha deve ter ao menos 6 caracteres.'; return; }
  if (p1 !== p2) { errEl.textContent = 'As senhas não coincidem.'; return; }
  
  const updated = { ...currentUser, passHash: simpleHash(p1), firstLogin: false };
  await dbPut('users', updated);
  currentUser = updated;
  sessionStorage.setItem('plastoriUser', JSON.stringify(updated));
  document.getElementById('setPasswordScreen').classList.remove('open');
  toast('Senha definida com sucesso!', 'success');
  showApp();
}

function doLogout() {
  sessionStorage.removeItem('plastoriUser');

}

async function getDeals() {

  if (currentUser.role === 'admin') return all;
  // Sellers see only their own
  const vendorNames = getVendorAliases(currentUser.vendor);
  return all.filter(d => vendorNames.includes((d.Vendedor||'').toUpperCase()));
}

function getVendorAliases(vendor) {
  if (!vendor) return [];
  const v = vendor.toUpperCase();
  // Map display names to all possible aliases in data
  const aliases = {
    'NAYLA': ['NAYLA'],
    'NATALIA': ['NATALIA', 'NATÁLIA'],
    'MARCELO': ['MARCELO'],
    'ADELITA': ['ADELITA'],
  };
  return aliases[v] || [v];
}

function fmtMoney(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return 'R$ –';
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtNum(v) {
  const n = parseFloat(v);
  if (isNaN(n) || !v) return '–';
  return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

    'reprovado finan': ['badge-purple', '✗ Financeiro'],
    'amostra': ['badge-orange', '🧪 Amostra'],
  };
  const key = (s||'').toLowerCase().trim();
  const [cls, label] = m[key] || ['badge-gray', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

async function renderVendorRanking(deals) {
  const vendors = {};
  deals.forEach(d => {
    const v = (d.Vendedor||'').toUpperCase();
    if (!v) return;
    if (!vendors[v]) vendors[v] = { name: v, total: 0, count: 0, approved: 0 };
    if ((d.Status||'').toLowerCase() === 'aprovado') {
      vendors[v].total += parseFloat(d.ValorTotal)||0;
      vendors[v].approved++;
    }
    vendors[v].count++;
  });
  const sorted = Object.values(vendors).sort((a,b) => b.total - a.total);
  const max = sorted[0]?.total || 1;
  return `
    <div class="chart-card" style="margin-top:0">
      <div class="chart-title">Ranking de Vendedores</div>
      ${sorted.map((v,i) => `
        <div class="ranking-item">
          <div class="rank-num">#${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${v.name}</div>
            <div class="rank-sub">${v.approved} aprovados / ${v.count} negócios</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${(v.total/max*100).toFixed(1)}%"></div></div>
          </div>
          <div class="rank-value">${fmtMoney(v.total)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

let filterStatus = '', filterSearch = '';

async function renderNegocios() {
  const deals = await getDeals();
  allDeals = deals;
  renderNegociosTable();
}

function renderNegociosTable() {
  let filtered = allDeals;
  if (filterStatus) filtered = filtered.filter(d => (d.Status||'').toLowerCase().includes(filterStatus.toLowerCase()));
  if (filterSearch) {
    const q = filterSearch.toLowerCase();
    filtered = filtered.filter(d =>
      (d.Empresa||'').toLowerCase().includes(q) ||
      (d.Produto||'').toLowerCase().includes(q) ||
      (d.NoBriefing||'').toLowerCase().includes(q) ||
      (d.Comprador||'').toLowerCase().includes(q)
    );
  }
  const total = filtered.length;
  const pages = Math.ceil(total / DEALS_PER_PAGE);
  if (dealPage > pages) dealPage = 1;
  const start = (dealPage - 1) * DEALS_PER_PAGE;
  const pageData = filtered.slice(start, start + DEALS_PER_PAGE);
  const totalRev = filtered.filter(d => (d.Status||'').toLowerCase() === 'aprovado').reduce((s,d) => s + (parseFloat(d.ValorTotal)||0), 0);

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Negócios</div>
    <div class="section-sub">${total} registros encontrados — Faturamento aprovado: ${fmtMoney(totalRev)}</div>
    
    <div class="filters-bar">
      <select class="filter-select" onchange="filterStatus=this.value;dealPage=1;renderNegociosTable()">
        <option value="">Todos os Status</option>
        <option value="aprovado">Aprovado</option>
        <option value="prospecção">Prospecção</option>
        <option value="orçamento">Orçamento</option>
        <option value="perdido">Perdido</option>
        <option value="amostra">Amostra</option>
        <option value="reprovado">Reprovado</option>
      </select>
      <input type="text" class="filter-input" placeholder="🔍 Buscar empresa, produto..." value="${filterSearch}"
        oninput="filterSearch=this.value;dealPage=1;renderNegociosTable()" style="width:260px">
      <button class="btn btn-brand btn-sm" onclick="openAddDeal()">+ Novo Negócio</button>
      <button class="btn btn-ghost btn-sm" onclick="exportDealsExcel()">📥 Exportar Excel</button>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Status</th><th>Empresa</th><th>Produto</th><th>Qtde (KG)</th>
              <th>Valor Total</th><th>Data Inicial</th><th>Vendedor</th><th>Briefing</th><th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${pageData.length === 0 ? `<tr><td colspan="9" style="text-align:center;color:var(--text-muted);padding:24px">Nenhum negócio encontrado</td></tr>` :
              pageData.map(d => `
                <tr>
                  <td>${statusBadge(d.Status)}</td>
                  <td title="${d.Empresa||''}">${d.Empresa||'–'}</td>
                  <td title="${d.Produto||''}">${(d.Produto||'').substring(0,30)}</td>
                  <td>${fmtNum(d.QtdeKG)}</td>
                  <td style="color:var(--green);font-weight:600">${fmtMoney(d.ValorTotal)}</td>
                  <td style="font-family:'DM Mono',monospace;font-size:12px">${d.DataInicial||'–'}</td>
                  <td>${d.Vendedor||'–'}</td>
                  <td style="font-family:'DM Mono',monospace;font-size:12px">${d.NoBriefing||'–'}</td>
                  <td>
                    <button class="btn btn-ghost btn-sm" onclick="openEditDeal(${d.id})">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteDeal(${d.id})">🗑</button>
                  </td>
                </tr>
              `).join('')
            }
          </tbody>
        </table>
      </div>
      <div class="table-pagination">
        <span>Mostrando ${start+1}–${Math.min(start+DEALS_PER_PAGE,total)} de ${total}</span>
        <div class="pagination-btns">
          <button class="pg-btn" onclick="dealPage=Math.max(1,dealPage-1);renderNegociosTable()" ${dealPage===1?'disabled':''}>‹</button>
          ${Array.from({length:Math.min(pages,7)},(_,i)=>`<button class="pg-btn ${dealPage===i+1?'active':''}" onclick="dealPage=${i+1};renderNegociosTable()">${i+1}</button>`).join('')}
          <button class="pg-btn" onclick="dealPage=Math.min(${pages},dealPage+1);renderNegociosTable()" ${dealPage===pages?'disabled':''}>›</button>
        </div>
      </div>
    </div>
  `;
}

async function renderClientes() {
  const deals = await getDeals();
  // Group by company
  const companies = {};
  deals.forEach(d => {
    const c = d.Empresa || 'Sem nome';
    if (!companies[c]) companies[c] = { name: c, deals: [], totalRev: 0, cidade: d.Cidade, estado: d.Estado, comprador: d.Comprador, telefone: d.Telefone, email: d.Email };
    companies[c].deals.push(d);
    if ((d.Status||'').toLowerCase() === 'aprovado') companies[c].totalRev += parseFloat(d.ValorTotal)||0;
  });
  const sorted = Object.values(companies).sort((a,b) => b.totalRev - a.totalRev);

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Clientes</div>
    <div class="section-sub">${sorted.length} empresas cadastradas</div>
    <div class="filters-bar">
      <input type="text" class="filter-input" id="clientSearch" placeholder="🔍 Buscar empresa..." oninput="filterClientes(this.value)" style="width:280px">
    </div>
    <div id="clientTable"></div>
  `;
  renderClientTable(sorted);
}

function filterClientes(q) {
  const rows = document.querySelectorAll('#clientTable tbody tr');
  rows.forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';

}

function renderClientTable(companies) {

async function renderTarefas() {
  allTasks = await dbGetAll('tasks');
  const myTasks = allTasks.filter(t => !t.userId || t.userId === currentUser.username);
  const open = myTasks.filter(t => !t.done);
  const done = myTasks.filter(t => t.done);

  const pri = { urgente: 'badge-red', alta: 'badge-yellow', normal: 'badge-gray' };

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Tarefas & Follow-up</div>
    <div class="section-sub">${open.length} pendentes · ${done.length} concluídas</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-brand" onclick="document.getElementById('taskModal').classList.add('open')">+ Nova Tarefa</button>
    </div>
    <div class="tabs" id="taskTabs">
      <button class="tab active" onclick="switchTaskTab('open',this)">Pendentes (${open.length})</button>
      <button class="tab" onclick="switchTaskTab('done',this)">Concluídas (${done.length})</button>
    </div>
    <div id="taskListOpen">
      ${open.length === 0 ? `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Nenhuma tarefa pendente!</div></div>` :
        open.map(t => `
          <div class="task-item" id="task-${t.id}">
            <div class="task-check" onclick="toggleTask(${t.id})">&#10003;</div>
            <div class="task-info">
              <div class="task-title">${t.title}</div>
              <div class="task-meta">${t.client||''}</div>
            </div>
            <span class="badge ${pri[t.priority]||'badge-gray'}">${t.priority||'normal'}</span>
            <div class="task-date">${t.date||''}</div>
            <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">✕</button>
          </div>
        `).join('')
      }
    </div>
    <div id="taskListDone" style="display:none">
      ${done.length === 0 ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma tarefa concluída ainda.</div></div>` :
        done.map(t => `
          <div class="task-item" style="opacity:0.5">
            <div class="task-check done" onclick="toggleTask(${t.id})">&#10003;</div>
            <div class="task-info">
              <div class="task-title" style="text-decoration:line-through">${t.title}</div>
              <div class="task-meta">${t.client||''}</div>
            </div>
            <div class="task-date">${t.date||''}</div>
            <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">✕</button>
          </div>
        `).join('')
      }
    </div>
  `;
}

function switchTaskTab(type, el) {
  document.querySelectorAll('#taskTabs .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('taskListOpen').style.display = type === 'open' ? '' : 'none';
  document.getElementById('taskListDone').style.display = type === 'done' ? '' : 'none';
}

async function saveTask() {
  const title = document.getElementById('tTitle').value.trim();
  if (!title) { toast('Título é obrigatório', 'error'); return; }
  await dbPut('tasks', {
    title,
    client: document.getElementById('tClient').value,
    date: document.getElementById('tDate').value,
    priority: document.getElementById('tPriority').value,
    done: false,
    userId: currentUser.username,
    created: new Date().toISOString()
  });
  document.getElementById('taskModal').classList.remove('open');
  document.getElementById('tTitle').value = '';
  document.getElementById('tClient').value = '';
  toast('Tarefa criada!', 'success');
  renderTarefas();
}

async function toggleTask(id) {
  const tasks = await dbGetAll('tasks');
  const t = tasks.find(t => t.id === id);
  if (t) { await dbPut('tasks', { ...t, done: !t.done }); renderTarefas(); }
}

async function deleteTask(id) {
  await dbDelete('tasks', id);
  toast('Tarefa removida', 'success');
  renderTarefas();
}

async function renderTopClients(approved) {
  const map = {};
  approved.forEach(d => {

  return top.map(([name, val],i) => `
    <div class="ranking-item">
      <div class="rank-num">#${i+1}</div>
      <div class="rank-info">
        <div class="rank-name">${name}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(val/max*100).toFixed(1)}%"></div></div>
      </div>
      <div class="rank-value">${fmtMoney(val)}</div>
    </div>
  `).join('');
}

function openAddDeal() {
  editDealId = null;
  document.getElementById('dealModalTitle').textContent = 'Novo Negócio';
  ['fStatus','fEmpresa','fDataInicial','fDataFinal','fProduto','fQtde','fValorCliente','fValorMin','fValorTotal','fKGIdeal','fComprador','fTelefone','fEmail','fCidade','fEstado','fBriefing','fPedido','fOP','fObs'].forEach(id => {

async function openEditDeal(id) {
  const deals = await dbGetAll('deals');

  if (!d) return;
  editDealId = id;
  document.getElementById('dealModalTitle').textContent = 'Editar Negócio';

  document.getElementById('fEmpresa').value = d.Empresa || '';
  document.getElementById('fDataInicial').value = d.DataInicial || '';
  document.getElementById('fDataFinal').value = d.DataFinal || '';
  document.getElementById('fProduto').value = d.Produto || '';
  document.getElementById('fQtde').value = d.QtdeKG || '';
  document.getElementById('fValorCliente').value = d.ValorUnitCliente || '';
  document.getElementById('fValorMin').value = d.ValorUnitMinimo || '';
  document.getElementById('fValorTotal').value = d.ValorTotal || '';
  document.getElementById('fKGIdeal').value = d.KGBriefingIdeal || '';
  document.getElementById('fComprador').value = d.Comprador || '';
  document.getElementById('fTelefone').value = d.Telefone || '';
  document.getElementById('fEmail').value = d.Email || '';
  document.getElementById('fCidade').value = d.Cidade || '';
  document.getElementById('fEstado').value = d.Estado || '';
  document.getElementById('fBriefing').value = d.NoBriefing || '';
  document.getElementById('fPedido').value = d.NoPedido || '';
  document.getElementById('fOP').value = d.NoOP || '';
  document.getElementById('fObs').value = d.Observacao || '';
  document.getElementById('dealModal').classList.add('open');
}

function closeDealModal() {
  document.getElementById('dealModal').classList.remove('open');
}

async function saveDeal() {
  const empresa = document.getElementById('fEmpresa').value.trim();
  if (!empresa) { toast('Empresa é obrigatória', 'error'); return; }

  const deal = {
    Status: document.getElementById('fStatus').value,
    Empresa: empresa,
    DataInicial: document.getElementById('fDataInicial').value,
    DataFinal: document.getElementById('fDataFinal').value,
    Produto: document.getElementById('fProduto').value,
    QtdeKG: document.getElementById('fQtde').value,
    ValorUnitCliente: document.getElementById('fValorCliente').value,
    ValorUnitMinimo: document.getElementById('fValorMin').value,
    ValorTotal: document.getElementById('fValorTotal').value,
    KGBriefingIdeal: document.getElementById('fKGIdeal').value,
    Comprador: document.getElementById('fComprador').value,
    Telefone: document.getElementById('fTelefone').value,
    Email: document.getElementById('fEmail').value,
    Cidade: document.getElementById('fCidade').value,
    Estado: document.getElementById('fEstado').value,
    NoBriefing: document.getElementById('fBriefing').value,
    NoPedido: document.getElementById('fPedido').value,
    NoOP: document.getElementById('fOP').value,
    Observacao: document.getElementById('fObs').value,
    Vendedor: editDealId ? undefined : currentUser.vendor || currentUser.name.toUpperCase(),
    updatedAt: new Date().toISOString(),
  };

  if (editDealId) {
    const all = await dbGetAll('deals');
    const existing = all.find(d => d.id === editDealId);
    await dbPut('deals', { ...existing, ...deal });
    addLog(`Negócio editado: ${empresa}`);
    toast('Negócio atualizado!', 'success');
  } else {
    deal.createdAt = new Date().toISOString();
    await dbPut('deals', deal);
    addLog(`Negócio criado: ${empresa}`);
    toast('Negócio criado!', 'success');
  }
  closeDealModal();
  if (currentPage === 'negocios') renderNegocios();
  else if (currentPage === 'funil') renderFunil();
  else if (currentPage === 'dashboard') renderDashboard();
}

async function deleteDeal(id) {
  if (!confirm('Remover este negócio?')) return;
  await dbDelete('deals', id);
  addLog(`Negócio removido ID: ${id}`);
  toast('Negócio removido', 'success');
  renderNegocios();
}

async function exportDealsExcel() {
  const deals = await getDeals();
  const rows = deals.map(d => ({
    Status: d.Status, Empresa: d.Empresa, 'Data Inicial': d.DataInicial, 'Data Final': d.DataFinal,
    Produto: d.Produto, 'Qtde (KG)': d.QtdeKG, 'Valor Unit. Cliente': d.ValorUnitCliente,
    'Valor Unit. Mínimo': d.ValorUnitMinimo, 'Valor Total': d.ValorTotal,
    Comprador: d.Comprador, Telefone: d.Telefone, Email: d.Email,
    Cidade: d.Cidade, Estado: d.Estado, Vendedor: d.Vendedor,
    'Nº Briefing': d.NoBriefing, 'KG Briefing Ideal': d.KGBriefingIdeal,
    'Nº Pedido': d.NoPedido, 'Nº OP': d.NoOP, Observação: d.Observacao,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'CRM');
  XLSX.writeFile(wb, `Plastori_CRM_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel exportado!', 'success');
}

function exportDealsCSV() {
  getDeals().then(deals => {
    const headers = ['Status','Empresa','DataInicial','DataFinal','Produto','QtdeKG','ValorUnitCliente','ValorUnitMinimo','ValorTotal','Comprador','Telefone','Email','Cidade','Estado','Vendedor','NoBriefing','KGBriefingIdeal','NoPedido','NoOP','Observacao'];
    const csv = [headers.join(';')].concat(deals.map(d => headers.map(h => `"${(d[h]||'').toString().replace(/"/g,'""')}"`).join(';'))).join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Plastori_CRM_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast('CSV exportado!', 'success');
  });
}

async function exportBackupJSON() {
  const deals = await dbGetAll('deals');
  const tasks = await dbGetAll('tasks');
  const logs = await dbGetAll('logs');
  const payload = { version: 1, ts: new Date().toISOString(), deals, tasks, logs };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Plastori_Backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Backup exportado!', 'success');
}

async function restoreBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    if (!data.deals) throw new Error('Formato inválido');
    if (!confirm(`Restaurar ${data.deals.length} negócios? Os dados atuais serão substituídos.`)) return;
    for (const d of data.deals) await dbPut('deals', d);
    for (const t of data.tasks||[]) await dbPut('tasks', t);
    toast(`${data.deals.length} negócios restaurados!`, 'success');
    navigate(currentPage);
  } catch(e) {
    toast('Arquivo de backup inválido', 'error');
  }
  input.value = '';
}

async function handleImportExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
  // Find header row
  let headerIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if (rows[i] && rows[i].some(c => typeof c === 'string' && c.toLowerCase().includes('status'))) {
      headerIdx = i; break;
    }
  }
  if (headerIdx < 0) { toast('Cabeçalho não encontrado no Excel', 'error'); return; }
  const headers = rows[headerIdx];
  let imported = 0;
  for (let i = headerIdx+1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[0]) continue;
    const deal = {};
    const map = ['Status','Empresa','DataInicial','DataFinal','Produto','QtdeKG','ValorUnitCliente','ValorUnitMinimo','ValorTotal','Comprador','Telefone','Email','Cidade','Estado','Vendedor','NoBriefing','KGBriefingIdeal','NoPedido','NoOP','Observacao'];
    map.forEach((key, idx) => {
      const val = row[idx];
      deal[key] = val != null ? String(val) : '';
      if (val instanceof Date) deal[key] = val.toISOString().slice(0,10);
    });
    await dbPut('deals', deal);
    imported++;
  }
  toast(`${imported} registros importados!`, 'success');
  navigate(currentPage);
  input.value = '';
}

// =====================================================================
// TOAST
// =====================================================================
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 400); }, 3000);
}
